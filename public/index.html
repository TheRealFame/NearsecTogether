<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <meta charset="utf-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="description" content="NearsecTogether">
  <title>NearsecTogether</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --accent: #c084fc;
      --accent-green: #00ff88;
      --accent-orange: #ffaa88;
      --accent-dim: rgba(192, 132, 252, 0.18);
      --muted: #555;
      --danger: #ff4444;
      --warn: #ffaa00;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
      touch-action: manipulation;
    }

    /* ── Video ─────────────────────────────────────── */
    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* ── PIN screen ────────────────────────────────── */
    #pinScreen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 500;
    }

    #pinScreen.gone {
      display: none;
    }

    #pinScreen h2 {
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #pinInput {
      background: #141414;
      border: 1px solid #333;
      color: #eee;
      font-family: inherit;
      font-size: 32px;
      letter-spacing: .4em;
      padding: 10px 18px;
      width: 180px;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }

    #pinInput::-webkit-outer-spin-button,
    #pinInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    #pinInput:focus {
      border-color: var(--accent);
    }

    #nameInput {
      background: #141414;
      border: 1px solid #333;
      color: #eee;
      font-family: inherit;
      font-size: 14px;
      padding: 10px;
      width: 180px;
      text-align: center;
      outline: none;
      margin-bottom: 4px;
    }

    #pinSubmit {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 11px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: .1em;
    }

    #pinSubmit:hover {
      background: var(--accent);
      color: #000;
    }

    #pinErr {
      color: var(--danger);
      font-size: 11px;
      min-height: 16px;
    }

    /* ── Waiting / connecting overlay ──────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg);
      z-index: 100;
      transition: opacity .4s;
    }

    #overlay.gone {
      opacity: 0;
      pointer-events: none;
    }

    .spin {
      width: 30px;
      height: 30px;
      border: 2px solid #1a1a1a;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #overlayStatus {
      font-size: 12px;
      color: var(--muted);
    }

    /* Kishi / gamepad activation prompt */
    #gpPrompt {
      margin-top: 8px;
      padding: 10px 20px;
      border: 1px solid #252525;
      background: #0f0f0f;
      font-size: 11px;
      color: #444;
      text-align: center;
      line-height: 1.8;
      cursor: pointer;
      transition: border-color .2s;
    }

    #gpPrompt:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #gpPrompt.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #gpPrompt.gone {
      display: none;
    }

    /* ── Top bar ───────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      background: linear-gradient(to bottom, rgba(0, 0, 0, .75), transparent);
      opacity: 0;
      transition: opacity .3s;
      z-index: 50;
      pointer-events: none;
    }

    body:hover #topbar {
      opacity: 1;
    }

    .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
      display: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    #codecLabel {
      font-size: 9px;
      color: #333;
      padding: 1px 5px;
      border: 1px solid #1e1e1e;
      border-radius: 2px;
      margin-left: 4px;
    }

    /* ── Side tab ──────────────────────────────────── */
    #bar {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: clamp(8px, .7vw, 14px);
      overflow: hidden;
      background: rgba(0, 0, 0, .9);
      border-radius: 5px 0 0 5px;
      border: 1px solid #1a1a1a;
      border-right: none;
      transition: width .2s;
      z-index: 280;
    }

    #bar:hover,
    #bar.open {
      width: clamp(90px, 9vw, 130px);
    }

    #bar-inner {
      padding: clamp(5px, .6vw, 10px);
      display: flex;
      flex-direction: column;
      gap: clamp(3px, .4vw, 6px);
      min-width: 82px;
    }

    #bar button {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #222;
      border-radius: 20px;
      color: #777;
      font-family: inherit;
      font-size: clamp(9px, .9vw, 12px);
      padding: clamp(5px, .5vw, 8px) clamp(8px, .8vw, 12px);
      cursor: pointer;
      white-space: nowrap;
      width: 100%;
      transition: all 0.2s;
    }

    #bar button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #bartap {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: clamp(8px, .7vw, 14px);
      height: clamp(40px, 6vh, 80px);
      z-index: 279;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    /* ── Chat ──────────────────────────────────────── */
    #chatPanel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 260px;
      background: rgba(8, 8, 8, .95);
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .2s;
      z-index: 150;
    }

    #chatPanel.open {
      transform: translateY(0);
    }

    #chatLog {
      flex: 1;
      overflow-y: auto;
      padding: 5px 10px;
      font-size: clamp(9px, 1vmin, 13px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cmsg {
      line-height: 1.5;
      color: #888;
    }

    .cname {
      color: var(--accent);
      margin-right: 4px;
    }

    .cname.me {
      color: var(--warn);
    }

    #chatInput {
      display: flex;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    #chatMsg {
      flex: 1;
      background: #111;
      border: none;
      color: #eee;
      font-family: inherit;
      font-size: clamp(9px, 1vmin, 13px);
      padding: 6px 10px;
      outline: none;
    }

    #chatSend {
      background: none;
      border: none;
      border-left: 1px solid #1a1a1a;
      color: var(--muted);
      font-size: 11px;
      padding: 0 12px;
      cursor: pointer;
    }

    #chatSend:hover {
      color: var(--accent);
    }

    /* Landscape rotation — applies to both video and canvas */
    @media (orientation:portrait) {

      #video,
      #frameCanvas {
        width: 100vh;
        height: 100vw;
        transform-origin: top left;
        transform: rotate(90deg) translateX(0) translateY(-100%);
      }
    }

    .fs-btn-overlay {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-dim);
      backdrop-filter: blur(8px);
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px var(--accent-dim);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
    }
    body:hover .fs-btn-overlay {
      opacity: 1;
    }
    .fs-btn-overlay:hover {
      background: var(--accent);
      color: #000;
      transform: translateX(-50%) scale(1.15);
      box-shadow: 0 0 25px var(--accent);
      border-color: var(--accent);
    }
    .fs-btn-overlay svg {
      width: 20px;
      height: 20px;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .brand-img {
      height: 64px;
      filter: drop-shadow(0 0 15px rgba(187, 136, 255, 0.4));
    }
    .brand-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Controller guide modal ───────────────────────── */
    #controllerGuideModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
      opacity: 1;
      transition: opacity .2s;
    }

    #controllerGuideModal.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #controllerGuideCard {
      width: 500px;
      height: 570px;
      max-width: 90vw;
      max-height: 90vh;
      background: #0b0b0b;
      border: 1px solid #222;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,.6);
    }

    #controllerGuideTop {
      height: 52px;
      border-bottom: 1px solid #1d1d1d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    #controllerGuideTitle {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #controllerGuideClose {
      background: none;
      border: 1px solid #222;
      color: #777;
      font-family: inherit;
      font-size: 11px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 999px;
    }

    #controllerGuideClose:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #controllerGuideFrame {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      overflow: hidden;
    }

    #controllerGuideConfirm {
      border: none;
      border-top: 1px solid #1d1d1d;
      background: #111;
      color: var(--accent);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      height: 52px;
      transition: background .2s;
    }

    #controllerGuideConfirm:hover {
      background: #171717;
    }

    /* ── Touch UI Overlay (Transparent) ───────────────────────── */
    #touchUI {
      position: fixed;
      inset: 0;
      z-index: 250; /* Over video, under modals */
      pointer-events: none; /* Let clicks pass through empty space */
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #touchUI.gone {
      display: none;
    }

    #touchUI .controls-left,
    #touchUI .controls-right,
    #touchUI .top-buttons,
    #touchUI .center-ui {
      pointer-events: auto; /* Re-enable clicks on controls */
    }

    #touchUI .controls-left,
    #touchUI .controls-right {
      position: absolute;
      bottom: 4vh;
      width: 38vw;
      height: 42vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #touchUI .controls-left { left: 0; }
    #touchUI .controls-right { right: 0; }

    #touchUI .joystick-base {
      position: relative;
      width: min(30vw, 180px);
      height: min(30vw, 180px);
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #touchUI .joystick-stick {
      width: 42%;
      height: 42%;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      transition: transform 0.05s linear;
    }

    #touchUI .buttons {
      position: relative;
      width: min(34vw, 260px);
      height: min(34vw, 260px);
    }

    #touchUI .button {
      position: absolute;
      width: min(14vw, 78px);
      height: min(14vw, 78px);
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.14);
      color: white;
      font-size: clamp(18px, 2vw, 26px);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    #touchUI .button:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.18);
    }

    #touchUI .y { top: 0; left: 50%; transform: translateX(-50%); }
    #touchUI .x { left: 0; top: 50%; transform: translateY(-50%); }
    #touchUI .b { right: 0; top: 50%; transform: translateY(-50%); }
    #touchUI .a { bottom: 0; left: 50%; transform: translateX(-50%); }

    #touchUI .top-buttons {
      position: absolute;
      top: 2vh;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 4vw;
    }

    #touchUI .trigger-group {
      display: flex;
      gap: 12px;
    }

    #touchUI .trigger {
      width: min(18vw, 130px);
      height: min(7vh, 48px);
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 1.6vw, 18px);
      backdrop-filter: blur(8px);
    }

    #touchUI .trigger:active {
      background: rgba(255,255,255,0.18);
    }

    #touchUI .center-ui {
      position: absolute;
      top: 2vh;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.48);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: clamp(12px, 1.2vw, 14px);
      backdrop-filter: blur(10px);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

  </style>
</head>

<body>
  <div id="pinScreen">
    <div class="brand-wrap">
      <img src="/assets/NearsecTogether.png" alt="NearsecTogether" class="brand-img">
      <div class="brand-name">NearsecTogether</div>
    </div>
    <div style="font-size:10px;color:#888;letter-spacing:0.05em">Play local co-op games over the internet
    </div>

    <div style="margin-top:20px;font-size:12px;color:#ccc">Display Name:</div>
    <input id="nameInput" type="text" placeholder="Guest" maxlength="20" onkeydown="if(event.key==='Enter')submitPin()">

    <div id="pinWrap">
      <div style="margin-top:10px;font-size:12px;color:#ccc">Enter PIN:</div>
      <input id="pinInput" type="number" placeholder="----" maxlength="4"
        oninput="if(this.value.length>4)this.value=this.value.slice(0,4)"
        onkeydown="if(event.key==='Enter')submitPin()">
    </div>

    <button id="pinSubmit" onclick="submitPin()">Join Stream</button>
    <div id="pinErr"></div>
  </div>

  <video id="video" autoplay playsinline disableRemotePlayback style="display:block"></video>
  <canvas id="frameCanvas"
    style="position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:none"></canvas>

  <div id="overlay">
    <div class="brand-wrap">
      <img src="/assets/NearsecTogether.png" alt="NearsecTogether" class="brand-img" style="height:48px;">
      <div class="brand-name" style="font-size:10px;">NearsecTogether</div>
    </div>
    <div class="spin" id="spinner"></div>
    <div id="overlayStatus" style="color: var(--accent); text-shadow: 0 0 10px var(--accent);">Connecting...</div>
    <div id="gpPrompt" onclick="activateGamepad()" style="border-color: var(--accent); color: var(--accent); box-shadow: inset 0 0 10px var(--accent-dim);">
      🎮 Tap here to activate controller<br>
      <span style="font-size:9px;color:#333">(Required by browser — once only)</span>
    </div>
  </div>

  <button class="fs-btn-overlay" id="fsOverlayBtn" onclick="toggleFS()" title="Toggle Fullscreen" style="border: 2px solid var(--accent) !important; background: rgba(0,0,0,0.6) !important;">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
      <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
    </svg>
  </button>

  <div id="topbar">
    <span class="dot-live" id="liveDot"></span>
    <span id="topStatus">Connecting...</span>
    <span id="codecLabel">—</span>
    <span style="font-size: 8px; color: var(--muted); margin-left: 10px; border-left: 1px solid #222; padding-left: 10px; display: none;" id="kbmHint">
      Click video to lock Keyboard/Mouse. Press ESC to release.
    </span>
    <span id="statsHud"
      style="margin-left:auto;display:none;gap:8px;font-size:9px;color:#444;display:none;align-items:center"></span>
  </div>

  <div id="bar">
    <div id="bar-inner">
      <button id="touchToggleBtn" onclick="toggleTouch()">📱 Touch UI</button>
      <button id="guideBtn" onclick="openControllerGuide()">? Guide</button>
      <button id="fsBtn" onclick="toggleFS()">[ ] Full</button>
      <button id="audBtn" onclick="toggleAudio()">♪ Audio</button>
      <button id="chatBtn" onclick="toggleChat()">✎ Chat</button>
    </div>
  </div>
  <button id="bartap" onclick="document.getElementById('bar').classList.toggle('open')"></button>

  <div id="chatPanel">
    <div id="chatLog"></div>
    <div id="chatInput">
      <input id="chatMsg" placeholder="Message..." maxlength="300" onkeydown="if(event.key==='Enter')sendChat()">
      <button id="chatSend" onclick="sendChat()">Send</button>
    </div>
  </div>

  <div id="touchUI" class="gone">
    <div class="top-buttons">
      <div class="trigger-group">
        <div class="trigger" data-btn="4">L1</div>
        <div class="trigger" data-btn="6">L2</div>
      </div>
      <div class="trigger-group">
        <div class="trigger" data-btn="5">R1</div>
        <div class="trigger" data-btn="7">R2</div>
      </div>
    </div>

    <div class="center-ui" onclick="toggleGyro()" id="gyroToggleBtn">
      Aim Gyro: OFF
    </div>

    <div class="controls-left">
      <div class="joystick-base" id="jBase">
        <div class="joystick-stick" id="jStick"></div>
      </div>
    </div>

    <div class="controls-right">
      <div class="buttons">
        <button class="button y" data-btn="3">Y</button>
        <button class="button x" data-btn="2">X</button>
        <button class="button b" data-btn="1">B</button>
        <button class="button a" data-btn="0">A</button>
      </div>
    </div>
  </div>

  <div id="controllerGuideModal" class="hidden">
    <div id="controllerGuideCard">
      <div id="controllerGuideTop">
        <div id="controllerGuideTitle">Controller Guide</div>
        <button id="controllerGuideClose" onclick="closeControllerGuide()">Close</button>
      </div>

      <iframe id="controllerGuideFrame" src="gamepad-popup.html" scrolling="no"></iframe>

      <button id="controllerGuideConfirm" onclick="acknowledgeControllerGuide()">Alright</button>
    </div>
  </div>

  <script src="viewer.js"></script>
</body>

</html>
