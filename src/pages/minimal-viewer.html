<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Nearsec Standalone Test</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; }
        #log { border: 1px solid #444; height: 300px; overflow-y: scroll; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <h3>Standalone Nearsec Audio Test</h3>
    <p>Open this file locally, enter your Public Nearsec PIN.</p>
    <input type="text" id="pin" placeholder="PIN">
    <button onclick="runTest()">Connect to Host</button>
    <audio id="audio" autoplay controls></audio>
    <div id="log"></div>

    <script>
        function log(msg) { document.getElementById('log').innerHTML += msg + '<br>'; }

        async function runTest() {
            const pin = document.getElementById('pin').value;
            // Connect to your live public instance
            const ws = new WebSocket(`wss://publicnearsec.cutefame.net/ws/viewer?pin=${pin}`);

            ws.onopen = () => log("Connected to WebSocket");
            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'offer') {
                    log("Offer received, creating PeerConnection...");
                    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

                    pc.ontrack = (e) => {
                        log("Track received: " + e.track.kind);
                        if (e.track.kind === 'audio') {
                            document.getElementById('audio').srcObject = e.streams[0];
                        }
                    };

                    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({ type: 'answer', sdp: answer }));
                    log("Answer sent.");
                }
            };
        }
    </script>
</body>
</html>
