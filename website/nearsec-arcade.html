<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <link rel="icon" type="image/png" href="NearsecTogether.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Arcade — Nearsec Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d0f;
      --surface: #121518;
      --accent: #c084fc;
      --accent-dim: #c084fc15;
      --text: #f0f3f5;
      --muted: #88929b;
      --border: #22282d;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      padding-top: 72px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .top-bar {
      height: 72px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
      position: fixed; top: 0; width: 100%;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }
    .logo { font-weight: 800; font-size: 18px; letter-spacing: .04em; }
    .logo span { color: var(--accent); }

    .search-wrap {
      flex: 1; max-width: 500px; margin: 0 40px;
      display: flex; align-items: center;
      background: #1a1e22; border-radius: 20px;
      padding: 0 16px; border: 1px solid var(--border);
      transition: border-color .2s;
    }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .4; }
    .search-wrap input {
      flex: 1; background: transparent; border: none;
      padding: 10px 10px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 13px;
      outline: none;
    }
    .search-wrap input::placeholder { color: var(--muted); }

    /* ── Floating Gamepad Button ── */
    .gamepad-btn {
      position: fixed;
      top: 88px;
      right: 20px;

      width: 48px;
      height: 48px;
      border-radius: 50%;

      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);

      font-size: 22px;
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 2500;

      transition:
        transform .15s,
        border-color .2s,
        background .2s;
    }

    .gamepad-btn:hover {
      transform: scale(1.08);
      border-color: var(--accent);
      background: #1a1e22;
    }

    /* ── Popup Modal ── */
    .gamepad-modal {
      position: fixed;
      inset: 0;

      background: rgba(0,0,0,.82);
      backdrop-filter: blur(6px);

      display: none;
      align-items: center;
      justify-content: center;

      z-index: 4000;
    }

    .gamepad-modal.open {
      display: flex;
    }

    /* ── Popup Window ── */
    .gamepad-window {
      width: 500px;
      height: 570px;

      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;

      overflow: hidden;

      display: flex;
      flex-direction: column;

      animation: gamepadIn .2s ease;
    }

    @keyframes gamepadIn {
      from {
        opacity: 0;
        transform: scale(.95) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ── Header ── */
    .gamepad-header {
      height: 54px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 16px;

      border-bottom: 1px solid var(--border);

      font-weight: 700;
    }

    .gamepad-header button {
      background: transparent;
      border: none;
      color: var(--muted);

      font-size: 18px;
      cursor: pointer;
    }

    .gamepad-header button:hover {
      color: var(--text);
    }

    /* ── Iframe ── */
    .gamepad-frame {
      flex: 1;
      width: 100%;
      background: #0b0d0f;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .gamepad-window {
        width: calc(100% - 24px);
        height: calc(100vh - 120px);
      }
    }
    /* ── Disclaimer Banner ── */
    .disclaimer {
      position: fixed;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 900px;

      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #ffd5d5;

      padding: 14px 18px;
      border-radius: 12px;

      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;

      backdrop-filter: blur(10px);
      z-index: 3000;

      animation: disclaimerFade 0.5s ease, disclaimerHide 0.5s ease 7s forwards;
    }

    @keyframes disclaimerFade {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes disclaimerHide {
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
        pointer-events: none;
      }
    }
    /* ── Live counter badge ── */
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; padding: 32px 32px;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; gap: 16px;
      color: var(--muted); font-size: 13px; text-align: center;
    }
    .empty-state svg { opacity: .15; }

    /* ── Card ── */
    .client-card {
      background: var(--surface); border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: cardIn .3s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .client-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(192,132,252,.12);
    }

    .thumb {
      height: 172px;
      background-size: cover; background-position: center;
      background-color: #1a1a1a;
      position: relative;
    }
    /* Fallback gradient for cards with no thumbnail */
    .thumb.no-img {
      background: linear-gradient(135deg, #1a1e22 0%, #0d1014 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .thumb.no-img svg { opacity: .15; width: 48px; height: 48px; }

    .latency-tag {
      position: absolute; top: 10px; right: 10px;
      padding: 3px 9px; border-radius: 20px;
      font-weight: 700; font-size: 10px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    }
    .latency-tag.green { color: var(--green); }
    .latency-tag.yellow { color: var(--yellow); }
    .latency-tag.red { color: var(--red); }
    .latency-tag.pending { color: var(--muted); }

    .card-body { padding: 16px 18px; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info { font-size: 12px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: #1a1e22; padding: 2px 8px;
      border-radius: 4px; border: 1px solid var(--border);
    }

    /* ── Join Modal ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      display: none; align-items: center; justify-content: center;
      z-index: 2000; padding: 20px;
      backdrop-filter: blur(6px);
    }
    .modal-bg.open { display: flex; }

    .modal-content {
      background: var(--surface);
      border-radius: 20px;
      width: 100%; max-width: 400px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: modalIn .25s cubic-bezier(0.16,1,.3,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.92) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Modal thumbnail hero */
    .modal-thumb {
      height: 160px;
      background-size: cover; background-position: center;
      background-color: #1a1a1a;
      position: relative;
    }
    .modal-thumb-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(18,21,24,.95) 100%);
    }
    .modal-thumb-title {
      position: absolute; bottom: 14px; left: 20px; right: 20px;
      font-size: 22px; font-weight: 800; line-height: 1.1;
    }
    .modal-thumb.no-img {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1e22 0%, #0d1014 100%);
    }
    .modal-thumb.no-img svg { opacity: .1; }

    .modal-body { padding: 20px 22px 24px; }

    .modal-meta {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .modal-tag {
      background: #1a1e22; border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; color: var(--muted);
    }

    /* PIN entry */
    .pin-section {
      display: none; margin-bottom: 18px;
    }
    .pin-section.show { display: block; }
    .pin-section label {
      display: block; font-size: 10px;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin-bottom: 6px;
    }
    .pin-section input {
      width: 100%; background: #1a1e22;
      border: 1px solid var(--border);
      color: var(--text); font-family: 'Outfit', sans-serif;
      font-size: 20px; font-weight: 700; letter-spacing: .25em;
      text-align: center; padding: 10px;
      border-radius: 8px; outline: none;
      transition: border-color .15s;
    }
    .pin-section input:focus { border-color: var(--accent); }

    /* Join button */
    .join-btn {
      display: block; width: 100%;
      background: var(--accent); color: #000;
      border: none; padding: 14px;
      border-radius: 12px; font-weight: 700;
      font-size: 15px; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .join-btn:hover { opacity: .9; }
    .join-btn:active { transform: scale(.98); }

    .close-link {
      display: block; text-align: center;
      margin-top: 12px; font-size: 12px;
      color: var(--muted); cursor: pointer;
    }
    .close-link:hover { color: var(--text); }

    @media (max-width: 768px) {
      .main-grid { padding: 16px; gap: 14px; }
      .search-wrap { display: none; }
    }
  </style>
</head>
<body>
<div class="disclaimer" id="disclaimer">
  <span onclick="document.getElementById('disclaimer').remove()"
        style="float:right; cursor:pointer; opacity:.7;">✕</span>

  <strong>Disclaimer:</strong> Nearsec Together is not responsible or liable for any sessions, content, interactions, or activities hosted by users on the arcade.
</div>
  <nav class="top-bar">
    <div class="logo" style="display:flex; align-items:center; gap:10px;">
      <img src="/assets/NearsecTogether.png" alt="NearsecTogether"
        style="height:28px; filter: drop-shadow(0 0 8px var(--accent-dim));"
        onerror="this.style.display='none'">
      <span>NEAR<span style="color:var(--accent)">SEC</span> <span style="font-weight:300; opacity:.55; font-size:13px;">Together</span></span>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search games or regions..." oninput="filterCards()">
    </div>

    <div class="live-badge">
      <div class="live-dot" id="liveDot" style="background:var(--muted); box-shadow:none;"></div>
      <span id="liveCount">—</span>
    </div>
  </nav>

  <div class="main-grid" id="clientGrid">
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <div>No public sessions right now.</div>
      <div style="font-size:11px; opacity:.5;">Sessions appear when a host goes public from the Nearsec host page.</div>
    </div>
  </div>

  <!-- Join Modal -->
  <div class="modal-bg" id="joinModal" onclick="if(event.target===this)closeJoin()">
    <div class="modal-content">
      <!-- Hero thumbnail with title overlay -->
      <div class="modal-thumb" id="mThumb">
        <div class="modal-thumb-overlay"></div>
        <div class="modal-thumb-title" id="mTitle"></div>
      </div>

      <div class="modal-body">
        <div class="modal-meta" id="mMeta"></div>

        <!-- PIN entry — only shown if session has a PIN -->
        <div class="pin-section" id="pinSection">
          <label>Session PIN</label>
          <input type="text" id="pinInput" maxlength="6" placeholder="••••" autocomplete="off">
        </div>

        <button class="join-btn" onclick="joinSession()">
          ▶ Join Session
        </button>
        <span class="close-link" onclick="closeJoin()">Cancel</span>
      </div>
    </div>
  </div>
  <button class="gamepad-btn" onclick="openGamepadTester()">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-gamepad-directional-icon lucide-gamepad-directional"><path d="M11.146 15.854a1.207 1.207 0 0 1 1.708 0l1.56 1.56A2 2 0 0 1 15 18.828V21a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2.172a2 2 0 0 1 .586-1.414z"/><path d="M18.828 15a2 2 0 0 1-1.414-.586l-1.56-1.56a1.207 1.207 0 0 1 0-1.708l1.56-1.56A2 2 0 0 1 18.828 9H21a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1z"/><path d="M6.586 14.414A2 2 0 0 1 5.172 15H3a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2.172a2 2 0 0 1 1.414.586l1.56 1.56a1.207 1.207 0 0 1 0 1.708z"/><path d="M9 3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2.172a2 2 0 0 1-.586 1.414l-1.56 1.56a1.207 1.207 0 0 1-1.708 0l-1.56-1.56A2 2 0 0 1 9 5.172z"/></svg>
</button>

<!-- Gamepad Popup -->
<div class="gamepad-modal" id="gamepadModal" onclick="if(event.target===this)closeGamepadTester()">
  <div class="gamepad-window">
    <div class="gamepad-header">
      <span>Controller Tester</span>
      <button onclick="closeGamepadTester()">✕</button>
    </div>

    <iframe
      src="../public/gamepad-popup.html"
      frameborder="0"
      class="gamepad-frame">
    </iframe>
  </div>
</div>
  <script src="arcade.js"></script>
</body>
</html>
