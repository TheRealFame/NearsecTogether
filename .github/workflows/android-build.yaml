name: Build Android APK

# Trigger the workflow on pushes to main, pull requests, or manually
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to click "Run workflow" from the GitHub UI

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js for npm and Capacitor
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use 18 or 20, standard for modern web apps
          cache: 'npm'

      # 3. Set up Java 17 (Required by modern Gradle/Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 4. Install Node dependencies
      - name: Install NPM dependencies
        run: npm ci # Uses package-lock.json for a clean, exact install

      # 5. Run your custom build script
      - name: Build Web Assets for Android
        run: |
          chmod +x ./bin/build-android.sh
          ./bin/build-android.sh

      # 6. Sync the built assets into the native Android folder
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. Compile the actual APK using Gradle
      - name: Build APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # 8. Upload the finished APK so you can download it from GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NearsecTogether-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7