name: Translate Readme

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: Auto Translate
        uses: Lin-jun-xiang/action-translate-readme@v2
        with:
          token: ${{ secrets.Action_Bot }}
          langs: "es,fr,de,pt,ja"
        env:
          # This satisfies the code error and forces it to use the free model
          OPENAI_API_KEY: "placeholder-value"
