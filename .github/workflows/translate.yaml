name: Translate README

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # STRICTLY REQUIRED for the push to work
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Translate - Spanish
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'es'

      - name: Translate - French
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'fr'

      - name: Translate - German
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'de'

      - name: Translate - Portuguese
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'pt'

      - name: Translate - Japanese
        uses: offensive-vk/auto-translate@master
        with:
          file: 'README.md'
          language: 'ja'

      # ── NEW TRANSLATED LOCALE REDIRECTOR ──
      - name: Re-route Readmes to Asset Directory
        run: |
          mkdir -p assets/locales/readmes
          for f in README.*.md; do
            if [ -f "$f" ]; then
              # Moves README.es.md -> assets/locales/readmes/README.es.md
              mv "$f" "assets/locales/readmes/$f"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/locales/readmes/README.*.md
          git commit -m "docs: auto-translate readmes and update asset localization directory [skip ci]" || echo "No changes to commit"
          git push
