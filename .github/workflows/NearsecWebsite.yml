name: Deploy Nearsec Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          # 1. Copy your home file to index.html for the root domain
          cp website/nearsec-home.html website/index.html

          # 2. Create the 'arcade' folder for clean URL routing
          mkdir -p website/arcade

          # 3. Copy the arcade HTML into that folder as index.html
          cp website/nearsec-arcade.html website/arcade/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to your specific website folder
          path: './website'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
