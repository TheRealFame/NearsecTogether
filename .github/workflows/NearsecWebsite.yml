name: Deploy Nearsec Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          # Create a dedicated dist folder to match the expected routing
          mkdir -p dist/arcade

          # 1. Route the main HTML files
          cp website/nearsec-home.html dist/index.html
          cp website/nearsec-arcade.html dist/arcade/index.html

          # 2. Copy the Arcade JS logic
          cp website/arcade.js dist/arcade/arcade.js

          # 3. Copy assets (Images, sounds, icons)
          cp -r assets dist/assets
          cp assets/NearsecTogether.png dist/NearsecTogether.png

          # 4. Copy auxiliary pages (like gamepad-popup.html)
          cp -r src/pages dist/pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point the upload to the fully assembled dist folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
