name: Deploy Nearsec Website

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          # Copy your home file to index.html for GitHub Pages
          cp website/nearsec-home.html website/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to your specific website folder
          path: './website'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
