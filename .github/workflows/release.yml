name: Build & Release NearsecTogether

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. DESKTOP BUILDS ──
  release-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt


      - name: Remove broken launcher symlinks
        shell: bash
        run: |
          rm -f NearsecTogether.cmd
          rm -f NearsecTogether.bat
          rm -f NearsecTogether.command

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      # ── NEW STEP: Install Linux build tools for RPM and Pacman ──
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --universal --publish always
          else
            npm run dist
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Static AppImage for Gearlever
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Find the generated AppImage
          APPIMAGE=$(find dist -maxdepth 1 -name "*.AppImage" | head -n 1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" dist/NearsecTogether-latest.AppImage
            # Upload it to the current release tag
            gh release upload ${{ github.ref_name }} dist/NearsecTogether-latest.AppImage --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── ITCH.IO UPLOADS ──
      - name: Prepare Windows Itch.io Release
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mv dist/"NearsecTogether Setup "*.exe "Nearsec Together (Windows).exe" || true

      - name: Publish Windows to Itch.io
        if: matrix.os == 'windows-latest'
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (Windows).exe"

      - name: Prepare Linux Itch.io Releases
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          APPIMAGE=$(find dist -maxdepth 1 -name "*.AppImage" | grep -v "latest" | head -n 1)
          DEB=$(find dist -maxdepth 1 -name "*.deb" | head -n 1)
          RPM=$(find dist -maxdepth 1 -name "*.rpm" | head -n 1)
          
          if [ -n "$APPIMAGE" ]; then mv "$APPIMAGE" "Nearsec Together (Linux).AppImage"; fi
          if [ -n "$DEB" ]; then mv "$DEB" "Nearsec Together (Debian).deb"; fi
          if [ -n "$RPM" ]; then mv "$RPM" "Nearsec Together (RedHat).rpm"; fi

      - name: Publish Linux (AppImage) to Itch.io
        if: matrix.os == 'ubuntu-latest'
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (Linux).AppImage"

      - name: Publish Linux (Debian) to Itch.io
        if: matrix.os == 'ubuntu-latest'
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-deb
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (Debian).deb"

      - name: Publish Linux (RedHat) to Itch.io
        if: matrix.os == 'ubuntu-latest'
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-rpm
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (RedHat).rpm"

      - name: Prepare macOS Itch.io Release
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find dist -maxdepth 1 -name "*.dmg" | head -n 1)
          if [ -n "$DMG" ]; then mv "$DMG" "Nearsec Together (Mac).dmg"; fi

      - name: Publish macOS to Itch.io
        if: matrix.os == 'macos-latest'
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: mac
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (Mac).dmg"

  # ── 2. ANDROID APK BUILD ──
  release-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Save Commit Hash
        run: echo "${{ github.sha }}" > commit.txt


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Web Assets for Android
        run: |
          chmod +x ./bin/build-android.sh
          ./bin/build-android.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      # ── FIX: Rename the APK before uploading ──
      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk "Nearsec Together (Android).apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Nearsec Together (Android).apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Android to Itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: android
          ITCH_GAME: nearsectogether
          ITCH_USER: cutefame
          PACKAGE: "Nearsec Together (Android).apk"
