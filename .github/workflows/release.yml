name: Build & Release NearsecTogether

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a version tag like v1.0.1

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # We build on Ubuntu for Linux and Windows for the .exe
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build & Publish
        # This command runs electron-builder and uploads to your GitHub Releases
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
